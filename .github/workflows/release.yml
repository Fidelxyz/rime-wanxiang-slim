name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-22.04

    steps:
      - uses: googleapis/release-please-action@v4
        id: release

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_tag_name: ${{ steps.release.outputs.tag_name }}

  build:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/build.yml

  release:
    runs-on: ubuntu-22.04
    needs: [build]
    if: needs.release-please.outputs.release_created == 'true'
    env:
      TAG_VERSION: ${{ needs.release-please.outputs.release_tag_name }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: rime-wanxiang-dist-${{ github.ref_name }}
          path: artifact

      - name: Generate release note
        run: bash scripts/generate-release-note.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: artifact/rime-wanxiang-*.zip
          tag_name: ${{ env.TAG_VERSION }}
          name: "${{ env.TAG_VERSION }} Rime万象拼音输入方案"
          body_path: release_notes.md
          draft: false
          prerelease: false
          make_latest: true

  release-branches:
    needs: [build]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release-branches.yml
