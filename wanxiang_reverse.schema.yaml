# Rime schema settings
# encoding: utf-8

schema:
  schema_id: wanxiang_reverse
  version: "0.5.0-beta.1"  # x-release-please-version
  author:
    - amzxyz
    - Fidel Yin <fidel.yin@hotmail.com>

engine:
  processors:
    - speller
  segmentors:
    - abc_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz;"
  delimiter: " '"
  algebra:
    __include: wanxiang_algebra:/reverse/全拼
    __patch: wanxiang_algebra:/reverse/hspzn  #笔画类型有hspzn，hupvd及hslzy（适配乱序17）可选

translator:
  dictionary: wanxiang_reverse
  enable_user_dict: false
