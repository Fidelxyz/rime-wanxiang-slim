      - erase/^([a-z◯]+);.*$/  # 删除原始带分号编码，加速检索，并防大写变体套娃
      - xform/◯/;/  #对于微软双拼、搜狗双拼，前面将分号保护了起来，现在放出来让其发挥作用
      - derive|^([a-z]{2})([a-z])([a-z]?)$|$1\u$2$3|  # 变体1：转第3位大写 (abCd)
