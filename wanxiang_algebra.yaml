      - derive/^([a-z◯]+);[^,]*,([a-z]).*$/$1$2/  # 双拼+1位辅助码
      - abbrev/^([a-z◯]+);[^,]*,([a-z])([a-z]).*$/$1$2$3/  # 双拼+2位辅助码
