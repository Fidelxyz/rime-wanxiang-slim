patch:
  speller/algebra:
    # ** 该选项由切换方案命令写入。如不了解原理，请勿手动修改。 **
    # 可选输入方案："全拼", "自然码", "智能ABC", "小鹤双拼", "微软双拼", "搜狗双拼", "紫光双拼", "国标双拼", "拼音加加", "乱序17", "自然龙", "汉心龙"
    __include: wanxiang_algebra:/reverse/全拼

    # 可选笔画拆分编码方案：
    # - "hspzn"
    # - "hupvd"（双拼编码）
    # - "hslzy"（乱序17编码）
    __patch: wanxiang_algebra:/reverse/hspzn
