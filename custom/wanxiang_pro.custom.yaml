patch:
  speller/algebra:
    __patch:
      # ** 该选项由切换方案命令写入。如不了解原理，请勿手动修改。 **
      # 可选输入方案："全拼", "自然码", "智能ABC", "小鹤双拼", "微软双拼", "搜狗双拼", "紫光双拼", "国标双拼", "拼音加加", "乱序17", "自然龙", "汉心龙"
      - wanxiang_algebra:/pro/全拼

      # ** 该选项由切换方案命令写入。如不了解原理，请勿手动修改。 **
      # 可选辅助码引导方案："直接辅助", "间接辅助"
      - wanxiang_algebra:/pro/直接辅助

      # 取消注释以开启模糊音。具体规则见 wanxiang_algebra.yaml。
      #- wanxiang_algebra:/模糊音

      # 取消注释以启用特定方案优化。部分音节字极少，几乎不参与构词，对此类编码提升对应四码字的优先级。
      #- wanxiang_algebra:/自然码提权
      #- wanxiang_algebra:/小鹤双拼提权

  # 使用非默认的自定义短语词库，位于用户目录下同名 user_custom_phrase.txt。
  #custom_phrase/user_dict: user_custom_phrase

  # 导入根目录下名称为 userdict.dict.yaml 的自定义固定词典，编码需与固定词库一致。
  #translator/packs/+:
  #- userdict

  # 每页候选词数量。
  menu/page_size: 6

  # 自动无词频造词（默认开启）。
  # add_user_dict/enable_auto_phrase: true

